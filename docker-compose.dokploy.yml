# Despliegue en VPS administrado con Dokploy.
# El dominio (torneo.shona.lat) y el HTTPS los gestiona el Traefik de Dokploy:
# en la UI de Dokploy se apunta el dominio al servicio `web`, puerto 80.
# Las variables ${...} se definen en la pestaña Environment del servicio Compose.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: "3000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        CADDYFILE: deploy/Caddyfile.dokploy
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network
    depends_on:
      - api

volumes:
  pgdata:

networks:
  internal:
  # Red compartida con el Traefik de Dokploy para el ruteo del dominio
  dokploy-network:
    external: true
